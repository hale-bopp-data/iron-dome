# Iron Dome — Configuration & Pattern Registry
# https://github.com/hale-bopp-data/iron-dome
#
# This is the default configuration. Copy to your repo root and customize.
# Per-repo overrides: create .iron-dome.yml in your repo root.
#
# Schema v2.1.0 (S285 — URL embedded creds + Forgejo password + sensitive file expansion)

version: "2.1.0"

# =============================================================================
# PRE-COMMIT GUARDS
# =============================================================================

guards:

  # --- Secrets Scan (BLOCKING) ---
  # Detects hardcoded secrets in staged files using regex patterns.
  # The Dumb Guard: no AI, no LLM — pure pattern matching.
  secrets:
    enabled: true
    severity: blocking
    critical_patterns:
      - name: "Private Key"
        pattern: '-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----'
        severity: critical

      - name: "GitHub PAT"
        pattern: 'ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{60,}'
        severity: critical

      - name: "GitLab Token"
        pattern: 'glpat-[A-Za-z0-9\-_]{20,}'
        severity: critical

      - name: "AWS Access Key"
        pattern: 'AKIA[0-9A-Z]{16}'
        severity: critical

      - name: "AWS Secret Key"
        pattern: '(?i)aws_secret_access_key\s*[:=]\s*[A-Za-z0-9/+=]{40}'
        severity: critical

      - name: "Azure Connection String"
        pattern: '(?i)DefaultEndpointsProtocol=https?;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/=]{40,}'
        severity: critical

      - name: "OpenAI / OpenRouter Key"
        pattern: 'sk-[a-zA-Z0-9]{20,}'
        severity: critical

      - name: "Hardcoded Password"
        pattern: '(?i)(password|passwd|pwd)\s*[:=]\s*["''][^"''$]{8,}["'']'
        severity: high

      - name: "Generic API Key Assignment"
        pattern: '(?i)(api[_-]?key|apikey|api[_-]?secret)\s*[:=]\s*["''][A-Za-z0-9\-_]{20,}["'']'
        severity: high

      - name: "Bearer Token Hardcoded"
        pattern: '(?i)bearer\s+[A-Za-z0-9\-_\.]{20,}'
        severity: high

      - name: "Generic Secret Assignment"
        pattern: '(?i)(secret|token|credential)\s*[:=]\s*["''][A-Za-z0-9\-_/+=]{20,}["'']'
        severity: high

      - name: "Azure DevOps PAT"
        pattern: '[A-Za-z0-9]{52}JQQJ99C[A-Za-z0-9]+'
        severity: critical

      - name: "Qdrant API Key"
        pattern: '(?i)qdrant[_-]?api[_-]?key\s*[:=]\s*["''][A-Za-z0-9]{20,}["'']'
        severity: high

      - name: "N8N API Key"
        pattern: 'n8n_api_[a-f0-9]{60,}'
        severity: critical

      - name: "Google / Gemini API Key"
        pattern: 'AIzaSy[A-Za-z0-9\-_]{33}'
        severity: critical

      - name: "Terraform Hardcoded Password"
        pattern: '(?i)initial_bot_password\s*='
        severity: high

      # --- S285 additions ---
      # Catches credentials embedded in URLs: https://user:password@host/...
      # Includes ADO PATs in git remote URLs, Forgejo clone URLs with passwords,
      # and HTTP Basic Auth baked into config files. Was the primary leak vector
      # for S285 (.git/config pattern on the server).
      - name: "URL Embedded Credentials"
        pattern: 'https?://[^/\s:@]+:[^/\s@]{8,}@[^\s]+'
        severity: critical

      # Forgejo default admin creds in docker-compose, env files, deploy scripts.
      # Detected after S285 audit of forgejo backup configs.
      - name: "Forgejo Embedded Password"
        pattern: '(?i)forgejo.*(password|passwd|pwd)\s*[:=]\s*["\x27]?[^\s"\x27]{6,}'
        severity: critical

    # Lines matching ANY safe pattern are skipped (false positive suppression)
    safe_patterns:
      - '\$\{[A-Z_]+\}'           # ${ENV_VAR}
      - '\$env:[A-Z_]+'           # $env:VAR (PowerShell)
      - 'process\.env\.'          # process.env.VAR (Node.js)
      - 'os\.environ'             # os.environ (Python)
      - 'System\.getenv'          # Java
      - 'env\(\s*["\x27]'         # env("VAR") — various frameworks
      - 'ChangeMe'
      - 'placeholder'
      - 'example'
      - '<REDACTED>'
      - '<PASTE_'
      - 'UNKNOWN_PLEASE'
      - 'your[_-]?api[_-]?key'
      - 'xxx+'
      - '\.env\.example'

  # --- Conflict Markers (BLOCKING) ---
  # Blocks commits containing unresolved merge conflict markers.
  conflict_markers:
    enabled: true
    severity: blocking

  # --- Docker Run Guard (BLOCKING) ---
  # Enforces "compose only" policy — blocks docker run in scripts.
  docker_run:
    enabled: false  # opt-in: not every project uses Docker
    severity: blocking
    file_types: ["*.sh", "*.bash", "*.ps1", "*.psm1", "*.py", "*.yml", "*.yaml"]
    message: "Use 'docker compose' instead. All containers should be managed via compose."

  # --- Large File Guard (BLOCKING) ---
  # Blocks commits of files exceeding a size threshold.
  large_file:
    enabled: true
    severity: blocking
    max_size_kb: 1024  # 1MB default
    exclude: ["*.lock", "package-lock.json", "yarn.lock"]

  # --- Sensitive File Guard (BLOCKING) ---
  # Blocks commits of files with dangerous filenames (not just content).
  sensitive_files:
    enabled: true
    severity: blocking
    patterns:
      - ".env"
      - ".env.local"
      - ".env.production"
      - "*.pem"
      - "*.key"
      - "*.pfx"
      - "*.p12"
      - "id_rsa*"
      - "id_ed25519*"
      - "credentials.json"
      - "service-account*.json"
      - "*.keystore"
      - ".env.developer"
      - ".env.executor"
      - ".env.github"
      - ".env.prod"
      - ".env.publish"
      - "*.tfvars"
      - "age-key.txt"
      - "*.decrypted"
      - ".mcp.json"
      # --- S285 additions ---
      - ".mcp.json.bak"
      - ".mcp.json.old"
      - ".mcp.json.*"
      - ".env.secrets"
      - ".env.secrets.*"
      - "secrets-registry.json"
    allow:
      - ".env.example"
      - ".env.template"
      - "*.pem.example"
      - "*.tfvars.example"

  # --- Local Links Guard (BLOCKING) — G-CI-3 ---
  # Blocks package-lock.json with local symlink references (npm link artifacts).
  # These work locally but break npm ci in CI.
  local_links:
    enabled: true
    severity: blocking
    message: "Local symlink in package-lock.json. Run: npm uninstall <pkg> && npm install <pkg>"

  # --- Untracked Imports Guard (BLOCKING) — G-CI-5 ---
  # Detects staged .ts/.js files importing from relative paths that point to
  # files not tracked by git. Builds locally but fails in CI.
  untracked_imports:
    enabled: true
    severity: blocking
    file_types: ["*.ts", "*.tsx", "*.js", "*.jsx", "*.mts", "*.mjs"]
    message: "Importing untracked file. Run: git add <file>"

  # --- Lockfile Sync Guard (BLOCKING) — G-CI-6 ---
  # Blocks commits where package.json is staged without package-lock.json.
  # Desync causes npm ci to fail in CI.
  lockfile_sync:
    enabled: true
    severity: blocking
    message: "package.json staged without package-lock.json. Run: npm install && git add package-lock.json"

  # --- Command Injection Guard (BLOCKING) — Audit S244 ---
  # Detects execSync/spawnSync with string interpolation in JS/TS.
  # Safe alternative: execFileSync("cmd", ["arg1", "arg2"])
  exec_injection:
    enabled: true
    severity: blocking
    file_types: ["*.js", "*.mjs", "*.cjs", "*.ts", "*.mts"]
    message: "Use execFileSync(cmd, [args]) instead of execSync with string interpolation."

  # --- XSS Guard (BLOCKING) — Audit S244 ---
  # Detects innerHTML assignments with dynamic content.
  # SVG injection is especially dangerous (can contain <script>).
  # Safe alternative: textContent, DOM API, or DOMPurify for HTML.
  innerhtml_xss:
    enabled: true
    severity: blocking
    file_types: ["*.js", "*.mjs", "*.ts", "*.mts", "*.tsx", "*.jsx", "*.html"]
    message: "Use textContent or DOM API instead of innerHTML with dynamic content."

  # --- Database Credentials Guard (BLOCKING) — Audit S244 ---
  # Detects hardcoded database connection strings with embedded passwords.
  # Covers PostgreSQL, MySQL, MongoDB, SQL Server, Redis.
  db_credentials:
    enabled: true
    severity: blocking
    message: "Use environment variables for database connection strings."

  # --- Docker Socket Guard (BLOCKING) — Audit S244 ---
  # Detects docker.sock mounts in compose/Dockerfiles.
  # docker.sock access = container escape, even with :ro.
  docker_socket:
    enabled: false  # opt-in: some setups legitimately need it
    severity: blocking
    message: "docker.sock mount allows container escape. Use a delegated proxy or remove."

  # --- Bind All Interfaces Guard (BLOCKING) — Audit S244 ---
  # Detects services binding to 0.0.0.0 (all interfaces).
  # Bypasses reverse proxy auth when exposed externally.
  bind_all:
    enabled: false  # opt-in: Docker containers legitimately use 0.0.0.0 internally
    severity: blocking
    message: "Bind to 127.0.0.1 instead of 0.0.0.0 to prevent auth bypass."

  # --- JWT Dev Bypass Guard (BLOCKING) — Audit S244 / GEDI ---
  # Detects auth logic that is disabled when NODE_ENV=development or DB_MODE=mock.
  # Hardcoded dev-user/test-user identities in auth middleware.
  # GEDI: "La vittoria si ottiene prima della battaglia" — catch before prod.
  jwt_dev_bypass:
    enabled: true
    severity: blocking
    file_types: ["*.js", "*.mjs", "*.cjs", "*.ts", "*.mts"]
    message: "Auth bypass based on NODE_ENV/DB_MODE detected. Use feature flags, not env checks."

  # --- CORS Wildcard Guard (BLOCKING) — Audit S244 / GEDI ---
  # Detects Access-Control-Allow-Origin: *, cors({origin: true}),
  # and reflected origin without validation.
  # GEDI Testudo: "C'e' un punto debole dove gli scudi non si toccano?"
  cors_wildcard:
    enabled: true
    severity: blocking
    message: "Use an explicit origin allowlist instead of wildcard CORS."

  # --- Webhook No Auth Guard (BLOCKING) — Audit S244 / GEDI ---
  # Detects webhook handlers without HMAC/signature verification.
  # Also catches optional webhook secrets (secret || "").
  # GEDI Black Swan: "Se questa difesa viene bypassata, il sistema collassa?"
  webhook_no_auth:
    enabled: false  # opt-in: needs careful tuning to avoid false positives
    severity: blocking
    message: "Webhook must verify signature (HMAC-SHA256). Never make secrets optional."

  # --- Eval Injection Guard (BLOCKING) — Audit S244 / GEDI ---
  # Detects eval(), new Function(), vm.runInNewContext with dynamic input.
  # These execute arbitrary code from strings — the most dangerous JS injection.
  # GEDI Invisible Shield: the best security is the one nobody notices.
  eval_injection:
    enabled: true
    severity: blocking
    message: "Never use eval/Function/vm.run* with dynamic input. Use safe alternatives."

  # --- Debt Guard (advisory) ---
  # Tracks new TODO/FIXME/HACK introduced in commits.
  debt:
    enabled: false  # opt-in
    severity: advisory
    keywords: ["TODO", "FIXME", "HACK", "XXX", "TEMP", "WORKAROUND"]
    exclude_files: ["CHANGELOG.md", "*.md", "iron-dome.yml"]

# =============================================================================
# COMMIT-MSG GUARDS
# =============================================================================

  # --- AB# ↔ Branch Match Guard (ADVISORY) ---
  # Warns when the commit references AB#N but the branch number is different.
  # Catches "orphan commits on wrong branch" pattern at commit time.
  # Never blocks — only emits a WARN on stderr.
  ab_match:
    enabled: true
    severity: advisory

# =============================================================================
# PRE-PUSH GUARDS
# =============================================================================

  # --- Branch Policy Guard (BLOCKING) ---
  # Blocks direct push to protected branches.
  branch_policy:
    enabled: true
    severity: blocking
    protected_branches: ["main", "master"]
    # Add "develop" if you use gitflow:
    # protected_branches: ["main", "master", "develop"]

  # --- Semaphore Check (BLOCKING) ---
  # Concurrency control for multi-agent environments.
  # Blocks push if another agent/session is working on the repo.
  semaphore:
    enabled: false  # opt-in: only needed for multi-agent setups
    severity: blocking
    # Semaphore file in repo root: .semaphore.json
    # Format: {"status":"green|yellow|red","session":"...","agent":"...","since":"..."}

  # --- Orphan Guard (BLOCKING) ---
  # Blocks push to branches that already have a completed/merged PR.
  orphan:
    enabled: false  # opt-in: requires git provider API access
    severity: blocking
    provider: auto  # auto | github | gitlab | ado
    # Provider is auto-detected from remote URL.
    # For ADO: set IRON_DOME_ADO_ORG and IRON_DOME_ADO_PROJECT env vars.

# =============================================================================
# FILE EXCLUSIONS (global)
# =============================================================================

exclusions:
  binary_extensions:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".gif"
    - ".ico"
    - ".woff"
    - ".woff2"
    - ".ttf"
    - ".eot"
    - ".zip"
    - ".gz"
    - ".tar"
    - ".exe"
    - ".dll"
    - ".so"
    - ".dylib"
    - ".pdf"
    - ".svg"
  skip_patterns:
    - 'node_modules/'
    - '\.git/'
    - 'vendor/'
    - '__pycache__/'
    - '\.venv/'
  max_file_size_kb: 512  # Skip scanning files larger than this

# =============================================================================
# WHITELIST (per-file / per-pattern exceptions with mandatory reason)
# =============================================================================
# Every exception MUST have a reason. No silent bypasses.
# This is auditable: "why was this allowed?"
#
# Each entry specifies:
#   - file: glob pattern for the file(s)
#   - guard: which guard to skip (secrets, sensitive_files, large_file, docker_run, etc.)
#   - pattern: (optional) specific secret pattern name to skip
#   - reason: (REQUIRED) why this exception exists
#   - approved_by: (optional) who approved the exception
#   - expires: (optional) ISO date — exception auto-reverts after this date

whitelist:
  - file: "src/ci/secrets-scan-ci.py"
    guard: secrets
    reason: "Contains regex patterns for secret detection (not actual secrets)"
  # Examples:
  # - file: "tests/fixtures/fake-credentials.json"
  #   guard: sensitive_files
  #   reason: "Test fixture with fake data, no real credentials"
  #   approved_by: "alice"
  #
  # - file: "docs/examples/api-demo.js"
  #   guard: secrets
  #   pattern: "Generic API Key Assignment"
  #   reason: "Documentation example with placeholder key 'your_api_key_here'"
  #
  # - file: "scripts/legacy-deploy.sh"
  #   guard: docker_run
  #   reason: "Legacy script pending migration to compose (tracked in PBI #435)"
  #   expires: "2026-06-01"
  #
  # - file: "data/large-seed.sql"
  #   guard: large_file
  #   reason: "Database seed file, 3MB, required for local dev setup"
  #   approved_by: "alice"

# =============================================================================
# TELEMETRY
# =============================================================================

telemetry:
  enabled: true
  # Log file location (auto-detected by OS if not set):
  #   Linux/macOS: ~/.iron-dome/telemetry.jsonl
  #   Windows: ~/.iron-dome/telemetry.jsonl
  # file: ~/.iron-dome/telemetry.jsonl
