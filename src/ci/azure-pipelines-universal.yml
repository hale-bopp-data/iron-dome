# Iron Dome Universal — Self-Contained Build Validation Pipeline
#
# ONE pipeline for ALL repos. No external dependencies required.
# Iron Dome is cloned on-the-fly from GitHub (or from a local path if installed).
#
# Setup:
#   1. Copy this file into your ADO project (or reference from iron-dome repo)
#   2. Create a pipeline in ADO pointing to this YAML
#   3. Project Settings > Repos > <repo> > Policies > main > Build Validation
#   4. Add this pipeline as a required check
#   5. Done — every PR to main will be scanned by Iron Dome
#
# Customization:
#   - iron-dome.yml in your repo root: enable/disable guards, set thresholds
#   - .iron-dome.yml in your repo root: per-repo overrides (disable patterns, add custom ones)
#   - whitelist section: exceptions with mandatory reason (auditable)
#   - Everything is configurable — guards, patterns, file types, severity, thresholds
#
# See: https://github.com/hale-bopp-data/iron-dome

trigger: none
pr: none

pool:
  name: 'Default'

steps:
  - checkout: self
    fetchDepth: 0
    displayName: 'Checkout PR repo (full history)'

  - script: |
      set -e

      REPO_NAME="$(Build.Repository.Name)"
      echo "============================================"
      echo "  Iron Dome — Build Validation"
      echo "  Repo: $REPO_NAME"
      echo "============================================"
      echo ""

      # --- Find or fetch Iron Dome ---
      IRON_DOME_HOME=""

      # Option 1: Pre-installed on agent (recommended for self-hosted)
      if [[ -f "/opt/iron-dome/src/iron-dome-scan.sh" ]]; then
        IRON_DOME_HOME="/opt/iron-dome"
        echo "Using pre-installed Iron Dome: $IRON_DOME_HOME"
      fi

      # Option 2: Clone from GitHub (works on hosted agents)
      if [[ -z "$IRON_DOME_HOME" ]]; then
        echo "Cloning Iron Dome from GitHub..."
        git clone --depth 1 https://github.com/hale-bopp-data/iron-dome.git /tmp/iron-dome 2>/dev/null || true
        if [[ -f "/tmp/iron-dome/src/iron-dome-scan.sh" ]]; then
          IRON_DOME_HOME="/tmp/iron-dome"
          echo "Using cloned Iron Dome: $IRON_DOME_HOME"
        fi
      fi

      if [[ -z "$IRON_DOME_HOME" ]]; then
        echo "##vso[task.logissue type=warning]Iron Dome not found. Install: git clone <repo> /opt/iron-dome"
        exit 0
      fi

      # --- Prepare ---
      export IRON_DOME_HOME
      chmod +x "$IRON_DOME_HOME/src/iron-dome-scan.sh"
      chmod +x "$IRON_DOME_HOME/src/iron-dome-core.sh"
      chmod +x "$IRON_DOME_HOME/src/guards/"*.sh 2>/dev/null || true

      # --- Scan (pre-commit guards: secrets, conflicts, etc.) ---
      cd "$(Build.SourcesDirectory)"
      bash "$IRON_DOME_HOME/src/iron-dome-scan.sh" --changed-only --verbose
    displayName: 'Iron Dome — Security Scan'
    env:
      SYSTEM_PULLREQUEST_TARGETBRANCH: $(System.PullRequest.TargetBranch)

  # --- CI-level guardrails (G-CI-8 → G-CI-14) ---
  # These run at repo level, not per-file. Each is independent and non-blocking
  # to each other (all run even if one fails). Final exit code is worst-of.

  - script: |
      set -e
      IRON_DOME_HOME="${IRON_DOME_HOME:-/opt/iron-dome}"
      if [[ ! -d "$IRON_DOME_HOME" ]]; then
        IRON_DOME_HOME="/tmp/iron-dome"
      fi
      CI_GUARDS="$IRON_DOME_HOME/src/ci"

      cd "$(Build.SourcesDirectory)"
      EXIT=0

      echo ""
      echo "============================================"
      echo "  Iron Dome — CI Guardrails (G-CI-8→14)"
      echo "============================================"
      echo ""

      for guard in \
        "$CI_GUARDS/test-import-coverage.py" \
        "$CI_GUARDS/pyproject-lint.py" \
        "$CI_GUARDS/ci-yaml-lint.py" \
        "$CI_GUARDS/secrets-scan-ci.py" \
        "$CI_GUARDS/dep-audit.py" \
        "$CI_GUARDS/empty-diff-check.py"; do

        if [[ -f "$guard" ]]; then
          echo "--- $(basename "$guard") ---"
          python3 "$guard" || EXIT=1
          echo ""
        fi
      done

      # G-CI-13 (min-test-gate) runs after tests — see separate step below
      if [[ $EXIT -ne 0 ]]; then
        echo "##vso[task.complete result=Failed;]Iron Dome CI guardrails: violations found"
      fi
      exit $EXIT
    displayName: 'Iron Dome — CI Guardrails (G-CI-8→14)'
    env:
      IRON_DOME_HOME: $(IRON_DOME_HOME)
      SYSTEM_PULLREQUEST_TARGETBRANCH: $(System.PullRequest.TargetBranch)
